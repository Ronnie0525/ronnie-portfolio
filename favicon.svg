<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <!-- Deep blue gradient background -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5a78ff"/>
      <stop offset="50%" stop-color="#3b5bff"/>
      <stop offset="100%" stop-color="#0a1f99"/>
    </linearGradient>
    <!-- Top gloss -->
    <linearGradient id="gloss" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <!-- Subtle shadow for monogram depth -->
    <linearGradient id="letterShadow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.25"/>
    </linearGradient>
  </defs>

  <!-- Base squircle -->
  <rect x="0" y="0" width="64" height="64" rx="16" ry="16" fill="url(#bgGrad)"/>

  <!-- Inner hairline ring -->
  <rect x="3.5" y="3.5" width="57" height="57" rx="13" ry="13"
        fill="none" stroke="#ffffff" stroke-opacity="0.18" stroke-width="0.8"/>

  <!-- Top gloss highlight -->
  <path d="M0 16 Q0 0 16 0 L48 0 Q64 0 64 16 L64 30 Q32 40 0 30 Z" fill="url(#gloss)"/>

  <!-- Corner accent dot -->
  <circle cx="54" cy="10" r="2" fill="#ffffff" fill-opacity="0.85"/>

  <!-- Soft drop beneath letters -->
  <ellipse cx="32" cy="54" rx="18" ry="1.6" fill="#000" opacity="0.18"/>

  <!-- Monogram: shadow layer (offset) -->
  <text x="32.5" y="46.5"
        font-family="'Plus Jakarta Sans','Inter',system-ui,sans-serif"
        font-weight="900"
        font-size="30"
        fill="#0a1f99"
        fill-opacity="0.55"
        text-anchor="middle"
        letter-spacing="-2.5">RB</text>

  <!-- Monogram: primary letters -->
  <text x="32" y="46"
        font-family="'Plus Jakarta Sans','Inter',system-ui,sans-serif"
        font-weight="900"
        font-size="30"
        fill="#ffffff"
        text-anchor="middle"
        letter-spacing="-2.5">RB</text>

  <!-- Shimmer line across letters -->
  <rect x="18" y="29" width="28" height="1.2" fill="url(#gloss)" opacity="0.6"/>

  <!-- Underline signature bar -->
  <rect x="22" y="52" width="14" height="2" rx="1" fill="#ffffff"/>
  <rect x="38" y="52" width="4" height="2" rx="1" fill="#ffffff" fill-opacity="0.5"/>
</svg>
